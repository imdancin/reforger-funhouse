game:
  name: "Dancins Reforger Funhouse - Freedom Fighters"
  maxPlayers: 10
  scenarioId: "{64B2F8D8059EE270}Missions/FreedomFighters/Everon.conf"
  modsList: "65AD7BCC9F6B3B4E,65AD7D2E9866FA6E,CAFEBEEFF0CACC1A,65AD7CF69FAF1FDD,6586079789278413,65AD7C379CBD394D,65AD7D4099944EBD,5D6EA74A94173EDF,65AD7D0D9941A380,5D6EBC81EB1842EF,65AD7D1E9EEAFA53"
  # Server visibility — false keeps it out of the public server browser
  visible: true
  # Admin Steam ID list
  admins: "76561197984093036"
  # Supported platforms
  supportedPlatforms: "PLATFORM_PC,PLATFORM_XBL,PLATFORM_PSN"
  # Game properties
  disableThirdPerson: "true"
  battlEye: "false"
  fastValidation: "true"
  serverMaxViewDistance: "2500"
  serverMinGrassDistance: "50"
  networkViewDistance: "2500"

idleMonitor:
  enabled: true
  schedule: "*/1 * * * *"
  image: "ghcr.io/acemod/reforger-funhouse-control-plane:latest"
  idleThresholdSeconds: "1800"
  teardownFunctionName: "arma-teardown-handler"
  awsRegion: "us-west-2"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

monitoring:
  enabled: true
  prometheus:
    scrapeInterval: 15s
    retention: 15d
    storageSize: 10Gi
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  kubeStateMetrics:
    scrapeInterval: 30s
  nodeExporter:
    scrapeInterval: 30s
  grafana:
    storageSize: 1Gi
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
