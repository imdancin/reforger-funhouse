game:
  name: "Dancins Reforger Funhouse - Procedural Combat"
  maxPlayers: 10
  scenarioId: "{C41D6575F3DAA075}Missions/ProceduralCombat_Eden.conf"
  modsList: "67352E1E1F06E599,692176BA1E98A39A,622120A5448725E3,6916EB7B2D7B3D69,5AE50EC5B8D6F4AE,60C4CE4888FF4621,61B7763A8AEB53B7,5EB744C5F42E0800,5DBD560C5148E1DA,60E573C9B04CC408,606C369BAC3F6CC3,611CB1D409001EB0,60C4C12DAE90727B"
  # Server visibility — false keeps it out of the public server browser
  visible: true
  # Admin Steam ID list
  admins: "76561197984093036"
  # Supported platforms
  supportedPlatforms: "PLATFORM_PC,PLATFORM_XBL,PLATFORM_PSN"
  # Game properties
  disableThirdPerson: "true"
  battlEye: "false"
  fastValidation: "true"
  serverMaxViewDistance: "2500"
  serverMinGrassDistance: "50"
  networkViewDistance: "2500"
  VONCanTransmitCrossFaction: "false"

idleMonitor:
  enabled: false
  image: "ghcr.io/imdancin/reforger-funhouse-control-plane:latest"
  sampleIntervalSeconds: 60
  metricsPort: 8000
  idleThresholdSeconds: "1800"
  teardownFunctionName: "arma-teardown-handler"
  awsRegion: "us-west-2"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

monitoring:
  enabled: true
  prometheus:
    scrapeInterval: 15s
    retention: 15d
    storageSize: 10Gi
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  kubeStateMetrics:
    scrapeInterval: 30s
  nodeExporter:
    scrapeInterval: 30s
  grafana:
    storageSize: 1Gi
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
