game:
  name: "Dancins Reforger Funhouse - Freedom Fighters - Modern Finland"
  maxPlayers: 10
  scenarioId: "{32780865629BA826}Missions/FreedomFighters/MSTP_Ruha_FF.conf"
  # Versions pinned to the set that compiled successfully in the local test on
  # 2026-07-24 (see logs_2026-07-24_11-34-06). Format: GUID=version, consumed by
  # the acemod image via GAME_MODS_IDS_LIST. Pinning removes version drift from
  # the server always pulling "latest" on restart. Mod order is irrelevant —
  # Reforger resolves load order from each addon's declared dependencies.
  # 66F87A85382A0B17 (RHS EPF persistence) is a dependency of Modern Opposition
  # V2; it was previously auto-injected unpinned, now listed explicitly at 1.0.21.
  modsList: "686CFA003A78E005=2.0.11,62B4A8E40D31F94B=1.0.11,60E573C9B04CC408=1.4.3,69C4D280111D2085=1.0.2,685767F866F5A6F8=1.0.3,686AFC1FB2E2D71B=1.1.10,64F841CAD0832625=1.0.6,60C4C12DAE90727B=1.4.3,61B7763A8AEB53B7=1.4.3,65AD60E204191D37=2.3.4,68F93ED47C3F047A=1.0.0,5DBD560C5148E1DA=1.4.3,69AA689E3645622F=1.0.1,5EB744C5F42E0800=1.4.3,CAFEBEEFF0CACC1A=0.69.2,653CB36244ADBE0F=1.0.3,5D6EA74A94173EDF=0.6.10,6847295A719282CD=1.0.28,BADC0DEDABBEDA5E=0.15.5089,595F2BF2F44836FB=0.15.5090,606C369BAC3F6CC3=1.4.3,60C4CE4888FF4621=1.4.4,5D6EBC81EB1842EF=0.6.18,1337C0DE5DABBEEF=0.15.5089,611CB1D409001EB0=1.4.3,66F87A85382A0B17=1.0.21"
  # Server visibility — false keeps it out of the public server browser
  visible: true
  # Admin Steam ID list
  admins: "76561197984093036,76561197972367908,76561198009355986"
  # Supported platforms
  supportedPlatforms: "PLATFORM_PC,PLATFORM_XBL,PLATFORM_PSN"
  # Game properties
  disableThirdPerson: "false"
  battlEye: "false"
  fastValidation: "true"
  serverMaxViewDistance: "2500"
  serverMinGrassDistance: "50"
  networkViewDistance: "2500"
  VONCanTransmitCrossFaction: "true"

metricsExporter:
  image: "ghcr.io/imdancin/reforger-funhouse-metrics-exporter:latest"
  sampleIntervalSeconds: 60
  metricsPort: 9877
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

monitoring:
  enabled: true
  prometheus:
    scrapeInterval: 15s
    retention: 15d
    storageSize: 10Gi
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  kubeStateMetrics:
    scrapeInterval: 30s
  nodeExporter:
    scrapeInterval: 30s
  grafana:
    storageSize: 1Gi
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
