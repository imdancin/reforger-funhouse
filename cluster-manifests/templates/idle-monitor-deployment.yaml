{{- if .Values.idleMonitor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idle-monitor
  namespace: default
  labels:
    app: idle-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idle-monitor
  template:
    metadata:
      labels:
        app: idle-monitor
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      restartPolicy: Always
      containers:
        - name: idle-monitor
          image: "{{ .Values.idleMonitor.image }}"
          command:
            - python
            - -m
            - discord_control_plane.handlers.idle_monitor
          ports:
            - containerPort: {{ .Values.idleMonitor.metricsPort }}
              protocol: TCP
              name: metrics
          env:
            - name: RCON_HOST
              value: "127.0.0.1"
            - name: RCON_PORT
              value: "1999"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arma-rcon-secret
                  key: rcon-password
            - name: IDLE_THRESHOLD_SECONDS
              value: "{{ .Values.idleMonitor.idleThresholdSeconds }}"
            - name: TEARDOWN_FUNCTION_NAME
              value: "{{ .Values.idleMonitor.teardownFunctionName }}"
            - name: AWS_REGION
              value: "{{ .Values.idleMonitor.awsRegion }}"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: eso-aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: eso-aws-credentials
                  key: secret-access-key
            - name: SAMPLE_INTERVAL_SECONDS
              value: "{{ .Values.idleMonitor.sampleIntervalSeconds }}"
            - name: METRICS_PORT
              value: "{{ .Values.idleMonitor.metricsPort }}"
          resources:
            requests:
              cpu: "{{ .Values.idleMonitor.resources.requests.cpu }}"
              memory: "{{ .Values.idleMonitor.resources.requests.memory }}"
            limits:
              cpu: "{{ .Values.idleMonitor.resources.limits.cpu }}"
              memory: "{{ .Values.idleMonitor.resources.limits.memory }}"
{{- end }}
