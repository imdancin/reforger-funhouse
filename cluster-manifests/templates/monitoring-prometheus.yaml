{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'kube-state-metrics'
        scrape_interval: {{ .Values.monitoring.kubeStateMetrics.scrapeInterval }}
        static_configs:
          - targets: ['kube-state-metrics:8080']

      - job_name: 'node-exporter'
        scrape_interval: {{ .Values.monitoring.nodeExporter.scrapeInterval }}
        static_configs:
          - targets: ['node-exporter:9100']

      - job_name: 'kubelet'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        static_configs:
          - targets: ['localhost:10250']

      - job_name: 'metrics-exporter'
        static_configs:
          - targets: ['metrics-exporter:{{ .Values.metricsExporter.metricsPort }}']
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: arma-local-storage
  claimRef:
    name: prometheus-pvc
    namespace: default
  local:
    path: /opt/arma-server-data/prometheus
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - arma-reforger-compute
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: arma-local-storage
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.monitoring.prometheus.retention }}"
          ports:
            - containerPort: 9090
              protocol: TCP
              name: web
          resources:
            requests:
              cpu: "{{ .Values.monitoring.prometheus.resources.requests.cpu }}"
              memory: "{{ .Values.monitoring.prometheus.resources.requests.memory }}"
            limits:
              cpu: "{{ .Values.monitoring.prometheus.resources.limits.cpu }}"
              memory: "{{ .Values.monitoring.prometheus.resources.limits.memory }}"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: web
{{- end }}
