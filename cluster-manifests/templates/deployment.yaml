apiVersion: apps/v1
kind: Deployment
metadata:
  name: arma-reforger
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arma-server
  template:
    metadata:
      labels:
        app: arma-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: reforger
          image: ghcr.io/acemod/arma-reforger:latest
          ports:
            - containerPort: 2001
              protocol: UDP
              name: game-port
            - containerPort: 1999
              protocol: TCP
              name: rcon
          resources:
            requests:
              memory: "6Gi"
              cpu: "2"
            limits:
              memory: "7Gi"
              cpu: "3"
          # RCON only starts listening once the Reforger server process has
          # finished loading the scenario/mods and is actually accepting
          # connections, so it's a reliable signal that the pod is truly
          # ready (as opposed to just "container process started").
          # This feeds ArgoCD's health status, which the EC2 bootstrap
          # script polls before reporting "ready" to the launch orchestrator.
          readinessProbe:
            tcpSocket:
              port: rcon
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          env:
            - name: SERVER_BIND_ADDRESS
              value: "0.0.0.0"
            - name: SERVER_BIND_PORT
              value: "2001"
            - name: SERVER_PUBLIC_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: arma-public-address-secret
                  key: public-address
            - name: SERVER_PUBLIC_PORT
              value: "2001"
            - name: GAME_NAME
              value: "{{ .Values.game.name }}"
            - name: GAME_MAX_PLAYERS
              value: "{{ .Values.game.maxPlayers }}"
            - name: GAME_SCENARIO_ID
              value: "{{ .Values.game.scenarioId }}"
            - name: GAME_MODS_IDS_LIST
              value: "{{ .Values.game.modsList }}"
            - name: RCON_PORT
              value: "1999"
            - name: RCON_ADDRESS
              value: "0.0.0.0"
            - name: RCON_PERMISSION
              value: "admin"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arma-rcon-secret
                  key: rcon-password
            - name: ARMA_PARAMS
              value: "-loadSessionSave -rcon"
            - name: SERVER_VISIBLE
              value: "{{ .Values.game.visible }}"
            - name: GAME_SUPPORTED_PLATFORMS
              value: "{{ .Values.game.supportedPlatforms }}"
            - name: GAME_ADMINS
              value: "{{ .Values.game.admins }}"
            - name: GAME_PROPS_DISABLE_THIRD_PERSON
              value: "{{ .Values.game.disableThirdPerson }}"
            - name: GAME_PROPS_BATTLEYE
              value: "{{ .Values.game.battlEye }}"
            - name: GAME_PROPS_FAST_VALIDATION
              value: "{{ .Values.game.fastValidation }}"
            - name: GAME_PROPS_SERVER_MAX_VIEW_DISTANCE
              value: "{{ .Values.game.serverMaxViewDistance }}"
            - name: GAME_PROPS_SERVER_MIN_GRASS_DISTANCE
              value: "{{ .Values.game.serverMinGrassDistance }}"
            - name: GAME_PROPS_NETWORK_VIEW_DISTANCE
              value: "{{ .Values.game.networkViewDistance }}"
            - name: GAME_PROPS_VON_CAN_TRANSMIT_CROSS_FACTION
              value: "{{ .Values.game.VONCanTransmitCrossFaction }}"
            - name: GAME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arma-game-passwords
                  key: game-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arma-game-passwords
                  key: game-admin-password
          volumeMounts:
            - name: reforger-vol
              mountPath: /reforger
              subPath: reforger
            - name: profile-vol
              mountPath: /home/profile
              subPath: Profile
      volumes:
        - name: reforger-vol
          persistentVolumeClaim:
            claimName: arma-game-pvc
        - name: profile-vol
          persistentVolumeClaim:
            claimName: arma-game-pvc