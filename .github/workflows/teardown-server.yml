name: Graceful Game Server Teardown

on:
  workflow_dispatch: # Allows manually triggering the teardown from GitHub UI

env:
  AWS_REGION: "us-west-2"
  INSTANCE_ID: "i-0123456789abcdef0" # Target EC2 Instance ID (Can be dynamic/output from tf)

jobs:
  graceful-shutdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-west-2"

      - name: Terraform Init
        run: terraform init

      - name: Fetch Dynamic Instance ID
        id: fetch_id
        run: |
          # Read the real-time ID directly from your S3/DynamoDB remote state
          INSTANCE_ID=$(terraform output -raw arma_instance_id)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Execute Remote Graceful Shutdown
        id: ssm_command
        run: |
          # Use the dynamic ID pulled from the previous step
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.fetch_id.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/usr/local/bin/kubectl scale deployment arma-reforger --replicas=0 --timeout=2m"]' \
            --query "Command.CommandId" \
            --output text)
          
          echo "SSM Command Sent. ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT


  infrastructure-teardown:
    needs: graceful-shutdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Scale Compute Down to Zero
        run: terraform apply -var="instance_count=0" -auto-approve